# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - integracion-bancaria

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Cambiado de 3.14 a 3.11 (3.14 no existe aún)

      - name: Create and start virtual environment
        run: |
          python -m venv antenv
          source antenv/bin/activate
          
      - name: Install dependencies
        run: |
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Opcional: Si necesitas hacer build local, descomenta esta sección
      # - name: Build step (if needed)
      #   run: |
      #     source antenv/bin/activate
      #     # Agrega aquí comandos de build si son necesarios
          
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.git/
            !__pycache__/
            !*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'integracion-bancaria'
          slot-name: 'Production'  # Descomentado y especificado
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EDD80596650A4BF68AE59C7FC9A1E175 }}
          package: .  # Especifica el directorio a desplegar